<div class="module-card">
    <h2>Display</h2>
    <p>0.96&quot; 80&times;160 ST7735S on SPI2</p>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:12px;">
        <div id="disp-mode-track" onclick="dispToggleMode()"
            style="position:relative;width:44px;height:24px;border-radius:12px;background:#444;transition:background .2s;flex-shrink:0;">
            <div id="disp-mode-knob"
                style="position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .2s;">
            </div>
        </div>
        <span id="disp-mode-label">Basic</span>
    </label>
    <div id="disp-basic-panel">{{BASIC_CARD}}</div>
    <div id="disp-renderer-panel" style="display:none">{{RENDERER_CARD}}</div>
    <script>
        var dispMode = 'basic';
        function dispUpdateVisual() {
            var r = dispMode === 'renderer';
            document.getElementById('disp-mode-track').style.background = r ? '#e8703a' : '#444';
            document.getElementById('disp-mode-knob').style.left = r ? '23px' : '3px';
            document.getElementById('disp-mode-label').textContent = r ? 'Renderer' : 'Basic';
            document.getElementById('disp-basic-panel').style.display = r ? 'none' : '';
            document.getElementById('disp-renderer-panel').style.display = r ? '' : 'none';
        }
        async function dispToggleMode() {
            var next = dispMode === 'basic' ? 'renderer' : 'basic';
            var data = await fetch('/api/display/mode?set=' + next).then(r => r.json());
            dispMode = data.mode;
            dispUpdateVisual();
        }
        dispUpdateVisual();
    </script>
</div>
