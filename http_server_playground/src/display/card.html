<div class="module-card">
    <h2>Display</h2>
    <p>0.96&quot; 80&times;160 ST7735S on SPI2</p>
    <div id="disp-mode-bar"
        style="display:flex;gap:4px;margin-bottom:12px;background:#333;border-radius:6px;padding:3px;">
        <button data-mode="basic" onclick="dispSetMode('basic')"
            style="flex:1;border:0;padding:6px 8px;border-radius:4px;background:transparent;color:#ddd;cursor:pointer;font-size:0.85rem;">Basic</button>
        <button data-mode="wireframe" onclick="dispSetMode('wireframe')"
            style="flex:1;border:0;padding:6px 8px;border-radius:4px;background:transparent;color:#ddd;cursor:pointer;font-size:0.85rem;">Wireframe</button>
        <button data-mode="shader" onclick="dispSetMode('shader')"
            style="flex:1;border:0;padding:6px 8px;border-radius:4px;background:transparent;color:#ddd;cursor:pointer;font-size:0.85rem;">Shader</button>
    </div>
    <div id="disp-basic-panel">{{BASIC_CARD}}</div>
    <div id="disp-wireframe-panel" style="display:none">{{RENDERER_CARD}}</div>
    <div id="disp-shader-panel" style="display:none">{{SHADER_CARD}}</div>
    <script>
        var dispMode = 'basic';
        function dispUpdateVisual() {
            var buttons = document.querySelectorAll('#disp-mode-bar button');
            for (var i = 0; i < buttons.length; i++) {
                var active = buttons[i].dataset.mode === dispMode;
                buttons[i].style.background = active ? '#e8703a' : 'transparent';
                buttons[i].style.color = active ? '#fff' : '#ddd';
            }
            document.getElementById('disp-basic-panel').style.display = dispMode === 'basic' ? '' : 'none';
            document.getElementById('disp-wireframe-panel').style.display = dispMode === 'wireframe' ? '' : 'none';
            document.getElementById('disp-shader-panel').style.display = dispMode === 'shader' ? '' : 'none';
        }
        async function dispSetMode(next) {
            if (next === dispMode) return;
            var data = await fetch('/api/display/mode?set=' + next).then(r => r.json());
            dispMode = data.mode;
            dispUpdateVisual();
        }
        dispUpdateVisual();
    </script>
</div>
