<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 SERVER</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="grid-overlay"></div>

    <div class="container">
        <main>
            <header>
                <h1>ESP32 Server</h1>
                <div style="display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px;">
                    <p>[ ESP32-C6 ]</p>
                    <p>[ RUST ]</p>
                    <p>[ NO_STD ]</p>
                    <p>[ EMBASSY ASYNC RUNTIME ]</p>
                </div>
            </header>

            <div class="card">
                <h2>Counter</h2>
                <span id="count" class="count-number">0</span>
                <p>Clicks</p>
                <div class="status" id="status">
                    <span class="status-indicator"></span>
                    <span>Initializing connection...</span>
                </div>
            </div>

            <div class="card">
                <div class="ferris-container">
                    <img src="https://rustacean.net/more-crabby-things/dancing-ferris.gif" alt="Dancing Ferris"
                        class="ferris">
                    <div class="scan-lines"></div>
                </div>
            </div>

            <div id="systemTime" style="text-align: center;"></div>
        </main>
    </div>

    <script>
        let lastCount = -1;
        const countElement = document.getElementById('count');
        const statusElement = document.getElementById('status');

        // Update system time
        function updateTime() {
            const now = new Date();
            const timeStr = now.toISOString().replace('T', ' ').substring(0, 19);
            document.getElementById('systemTime').textContent = `SYSTEM TIME: ${timeStr}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        async function updateData() {
            try {
                const response = await fetch('/api/count');
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                const data = await response.json();
                const newCount = data.count;

                // Update display
                countElement.textContent = newCount;

                // Add animation if count changed
                if (newCount !== lastCount && lastCount !== -1) {
                    countElement.classList.add('pop');
                    setTimeout(() => {
                        countElement.classList.remove('pop');
                    }, 400);
                }

                lastCount = newCount;
                statusElement.innerHTML = '<span class="status-indicator"></span><span>CONNECTED</span>';
                statusElement.className = 'status connected';
            } catch (error) {
                console.error('Error fetching count:', error);
                statusElement.innerHTML = '<span class="status-indicator"></span><span>DISCONNECTED</span>';
                statusElement.className = 'status error';
            }
        }

        // Poll every 1 second
        setInterval(updateData, 1000);
        updateData();
    </script>
</body>

</html>
